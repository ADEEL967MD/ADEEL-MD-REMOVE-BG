<!DOCTYPE html>
<html lang="en">
<head>
  <mcharset="UTF-8">
  <title>Remove Background</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 40px;
      background: #f5f5f5;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    img {
      max-width: 100%;
      margin-top: 15px;
      border-radius: 8px;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .loading {
      display: none;
      margin-top: 10px;
      color: #555;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Remove Background</h2>

  <input type="file" id="file"><br><br>

  <button onclick="upload()">Upload & Remove BG</button>

  <div class="loading" id="loading">Processing...</div>

  <h3>Preview</h3>
  <img id="preview">

  <h3>Result</h3>
  <img id="result">

  <br><br>
  <a id="download" style="display:none;" download="result.png">Download Image</a>
</div>

<script>
const WORKER_URL = "https://jerrycoder.oggyapi.workers.dev/rembg";

function upload() {
  const fileInput = document.getElementById("file");
  const file = fileInput.files[0];

  if (!file) {
    alert("Select an image first!");
    return;
  }

  document.getElementById("preview").src = URL.createObjectURL(file);

  const formData = new FormData();
  formData.append("file", file);

  document.getElementById("loading").style.display = "block";

  fetch(WORKER_URL, {
    method: "POST",
    body: formData
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById("loading").style.display = "none";

    if (data.status !== "success") {
      alert("Failed: " + JSON.stringify(data));
      return;
    }

    const imageUrl = data.result.url;

    document.getElementById("result").src = imageUrl;

    // Download button
    const dl = document.getElementById("download");
    dl.href = imageUrl;
    dl.style.display = "inline";
    dl.innerText = "Download Image";
  })
  .catch(err => {
    document.getElementById("loading").style.display = "none";
    alert("Error: " + err.message);
  });
}
</script>

</body>
</html>
